tags:
  - Contacts
summary: Retrieve a contact by ID
operationId: getContactById
description: Returns a contact object based on the provided ID
security:
  - bearerAuth: []
parameters:
  - in: path
    name: id
    required: true
    schema:
      type: string
    example: 67f6949e8ceafeed1f512fc3
responses:
  '200':
    description: Contact retrieved successfully
    content:
      application/json:
        schema:
          type: object
          required:
            - status
            - message
            - data
          properties:
            status:
              type: integer
              example: 200
            message:
              type: string
              example: Contact found
            data:
              $ref: '../../../components/schemas/contact.yaml'

  '401':
    $ref: '../../../components/responses/401.yaml'

  '404':
    description: Contact not found
    content:
      application/json:
        schema:
          type: object
          required:
            - status
            - message
          properties:
            status:
              type: integer
              example: 404
            message:
              type: string
              example: Contact with the given ID was not found

  '500':
    $ref: '../../../components/responses/500.yaml'
