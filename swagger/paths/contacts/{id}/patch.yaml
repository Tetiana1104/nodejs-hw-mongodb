tags:
  - Contacts
summary: Update contact details by ID
operationId: updateContactById
description: Edit contact information using contact ID
security:
  - bearerAuth: []
parameters:
  - in: path
    name: id
    required: true
    schema:
      type: string
    example: 67f6949e8ceafeed1f512fc3

requestBody:
  required: true
  content:
    multipart/form-data:
      schema:
        type: object
        properties:
          name:
            type: string
            example: Inna Kovalenko
          email:
            type: string
            example: inna.k@example.com
          phoneNumber:
            type: string
            example: '380000000099'
          contactType:
            type: string
            enum: [work, home, personal]
            example: home
          isFavourite:
            type: boolean
            example: true
          photo:
            type: string
            format: binary

responses:
  '200':
    description: Contact updated
    content:
      application/json:
        schema:
          type: object
          required:
            - status
            - message
            - data
          properties:
            status:
              type: integer
              example: 200
            message:
              type: string
              example: Contact has been updated
            data:
              $ref: '../../../components/schemas/contact.yaml'

  '400':
    description: Invalid data provided
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: integer
              example: 400
            message:
              type: string
              example: Update data missing or incorrect
            data:
              type: object
              example: {}

  401:
    $ref: '../../../components/responses/401.yaml'

  '404':
    description: Contact not found
    content:
      application/json:
        schema:
          type: object
          required:
            - status
            - message
          properties:
            status:
              type: integer
              example: 404
            message:
              type: string
              example: No contact with this ID

  '500':
    $ref: '../../../components/responses/500.yaml'
