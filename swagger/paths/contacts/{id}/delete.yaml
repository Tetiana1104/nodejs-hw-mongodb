tags:
  - Contacts
summary: Delete a contact by ID
operationId: removeContact
description: Permanently removes a contact using its ID
security:
  - bearerAuth: []
parameters:
  - in: path
    name: id
    required: true
    schema:
      type: string
    example: 67f6949e8ceafeed1f512fc3

responses:
  '204':
    description: Contact deleted
    content: {}

  '401':
    $ref: '../../../components/responses/401.yaml'

  '404':
    description: Contact not found
    content:
      application/json:
        schema:
          type: object
          required:
            - status
            - message
          properties:
            status:
              type: integer
              example: 404
            message:
              type: string
              example: No contact found with this ID

  '500':
    $ref: '../../../components/responses/500.yaml'
